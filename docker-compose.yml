services:
  n8n:
    image: n8nio/n8n:1.89.2
    container_name: longform-n8n
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=http://localhost:5678/
      - GENERIC_TIMEZONE=Asia/Seoul
    volumes:
      - ./storage/n8n:/home/node/.n8n
